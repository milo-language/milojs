name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: ubuntu-22.04
            target: linux-x64
          - os: ubuntu-22.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Build on 22.04, not 24.04: a binary links against the build host's glibc,
      # and 24.04's 2.39 floor makes releases refuse to start on Debian bookworm
      # (2.36). 22.04 gives 2.35, which covers bookworm and Ubuntu 22.04+.
      # That image defaults to clang 14, but milo emits opaque-pointer IR and
      # needs 15+, so select it explicitly.
      - name: select clang 15+ (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-15
          echo "/usr/lib/llvm-15/bin" >> "$GITHUB_PATH"

      - name: install milo
        run: |
          curl -fsSL -o milo.tar.gz \
            "https://github.com/milo-language/milo/releases/download/latest/milo-${{ matrix.target }}.tar.gz"
          tar xzf milo.tar.gz
          chmod +x milo
          echo "$PWD" >> "$GITHUB_PATH"

      # Two binaries by design: the engine runs raw .js with no host bindings
      # (what an embedder wants), the runtime adds the module loader, event loop,
      # and Node-compatible builtins.
      # The runtime's fetch/TLS path links OpenSSL, so a plain build leaves the
      # binary needing libssl.so.3 at runtime — it will not start on a machine
      # without it. --static-deps links the archives in instead.
      - name: install openssl static archives
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libssl-dev
          else
            brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          fi

      - name: build engine and runtime
        run: |
          milo build milojs-engine.milo -o milojs-engine --release --static-deps
          milo build milojs.milo -o milojs --release --static-deps

      - name: verify no openssl runtime dependency
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then deps=$(otool -L milojs); else deps=$(ldd milojs); fi
          if printf '%s' "$deps" | grep -qiE 'libssl|libcrypto'; then
            echo "ERROR: milojs still needs OpenSSL at runtime"; printf '%s\n' "$deps"; exit 1
          fi
          echo "milojs is OpenSSL-free"

      - name: smoke test
        run: |
          echo 'console.log("hello from milojs")' > /tmp/smoke.js
          out=$(./milojs-engine /tmp/smoke.js)
          test "$out" = "hello from milojs" || { echo "engine smoke failed: $out"; exit 1; }
          out=$(./milojs /tmp/smoke.js)
          test "$out" = "hello from milojs" || { echo "runtime smoke failed: $out"; exit 1; }
          echo "both binaries run"

      - name: package
        run: tar czf "milojs-${{ matrix.target }}.tar.gz" milojs milojs-engine README.md

      - uses: actions/upload-artifact@v4
        with:
          name: milojs-${{ matrix.target }}
          path: milojs-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: ls -lh milojs-*.tar.gz
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Rolling release from the latest passing commit on main.

            `milojs-engine` runs raw JavaScript with no host bindings.
            `milojs` is the runtime: module loader, event loop, Node-compatible
            builtins. Both are self-contained — no JSC, no V8.
          prerelease: true
          make_latest: true
          files: milojs-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
